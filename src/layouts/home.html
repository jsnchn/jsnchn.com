---
extends: base.html
---
[head]
<style>
	body {
		background: white !important;
		color: black !important;
	}

	@media (hover: hover) {
		body, body a, body button {
			cursor: none !important;
		}
	}

	header {
		width: 100%;
		height: 100vh;
		display: flex;
		flex-direction: column;
		justify-content: center;
		align-items: center;
		position: relative;
	}

	main {
		width: 100%;
		height: 100vh;
		display: flex;
		flex-direction: column;
		justify-content: space-evenly;
	}

	.logo .letter .left > div,
	.logo .letter .right > div {
		background: black !important;
	}

	a {
		color: black !important;
	}

	header .scroll-hint {
		position: absolute;
		bottom: 2rem;
		font-size: 0.75rem;
		font-family: var(--font-ui);
		opacity: 0.4;
		animation: bounce 2s infinite;
		transition: opacity 0.3s ease;
	}

	@keyframes bounce {
		0%, 100% { transform: translateY(0); }
		50% { transform: translateY(5px); }
	}

	section .content {
		display: flex;
		justify-content: center;
		align-items: center;
		gap: 1rem;
		width: 100%;
		font-size: 2rem;
	}

	section:last-child .content {
		font-size: 1rem;
	}

	/* Split overlay */
	.split-overlay {
		position: fixed;
		top: 0;
		left: 0;
		width: 100%;
		height: 100%;
		background: white;
		mix-blend-mode: difference;
		pointer-events: none;
		z-index: 1;
	}

	/* Cursor circles */
	.cursor-circle {
		position: fixed;
		border-radius: 50%;
		pointer-events: none;
		z-index: 3;
		mix-blend-mode: difference;
		transform: translate(-50%, -50%);
	}

	.circle-small {
		width: 8px;
		height: 8px;
		background: white;
		transition: transform 0.1s ease;
	}

	.circle-small--active {
		transform: translate(-50%, -50%) scale(0.5);
	}

	.circle-ring {
		border: 1px solid white;
		transition: width 0.15s ease, height 0.15s ease;
	}

	@media (hover: none) {
		.cursor-circle {
			display: none !important;
		}
	}

	/* Dialog above overlay */
	dialog {
		border: 2px solid black;
		background: white;
		color: black;
		max-width: 400px;
		width: 90%;
		padding: 0;
		box-shadow: 10px 10px 0px 0px black;
		z-index: 10;
		isolation: isolate;
	}
	dialog::backdrop {
		background: rgba(0, 0, 0, 0.5);
		z-index: 9;
	}
	.dialog-content {
		padding: 1rem;		
	}
	.dialog-content:hover, .dialog-content *:hover {
		cursor: auto !important;
	}
	.dialog-content button:hover {
		cursor: pointer !important;
	}

	@media (max-width: 768px) {
		section {
			display: flex;
			flex-direction: row;
			justify-content: center;
			width: 100%;
			flex: 1;
		}
		section .content {
			width: 100%;
			font-size: 1.25rem;
		}
		section:last-child .content {
			font-size: 0.75rem;
		}
	}
</style>
[/head]

<header>

			<div class="letter s" aria-hidden="true">

				<div class="right"><div></div><div></div></div>
			</div>
			<div class="letter n" aria-hidden="true">
				<div class="left"><div></div></div>
				<div class="right"><div></div></div>
			</div>
			<div class="letter c" aria-hidden="true">
				<div class="left"><div></div></div>
				<div class="right"><div></div><div></div></div>
			</div>
			<div class="letter h" aria-hidden="true">

<main>

			<p id="connect">Connect with me on <a href="https://x.com/jsnchn_" target="_blank" rel="noopener noreferrer" aria-label="X (Twitter) profile">X</a> and <a href="https://www.linkedin.com/in/jsnchn/" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn profile">Linkedin</a>.</p>
		</div>
	</section>

		<div class="content">

		</div>
	</section>
</main>
<div class="split-overlay" id="split-overlay"></div>
<div class="cursor-circle circle-small" id="circle-small"></div>
<div id="cursor-rings"></div>
<script>
	const modal = document.getElementById('about-modal');

	const overlay = document.getElementById('split-overlay');
	const circleSmall = document.getElementById('circle-small');
	const ringsContainer = document.getElementById('cursor-rings');

	// Generate 22 concentric rings with varying styles
	const rings = [];
	const ringStyles = ['solid', 'dotted', 'dashed'];
	for (let i = 0; i < 22; i++) {
		const el = document.createElement('div');
		el.className = 'cursor-circle circle-ring';
		const size = 20 + 8 * i + 1.2 * i * i;
		const t = i / 21; // 0..1
		const opacity = 0.45 * Math.pow(1 - t, 1.6);
		const borderWidth = Math.max(0.3, 1.5 - t * 1.2);
		const style = ringStyles[i % 3];
		el.style.width = size + 'px';
		el.style.height = size + 'px';
		el.style.opacity = opacity;
		el.style.borderWidth = borderWidth + 'px';
		el.style.borderStyle = style;
		el.style.transitionDuration = (0.1 + t * 0.25) + 's';
		ringsContainer.appendChild(el);
		rings.push(el);
	}

	const allCircles = [circleSmall, ...rings];

	modal.addEventListener('mouseleave', () => {
		allCircles.forEach(c => c.style.display = '');
	});

	modal.addEventListener('close', () => {
		allCircles.forEach(c => c.style.display = '');
	});

	let w = window.innerWidth;
	let h = window.innerHeight;
	let angle = (Math.random() - 0.5) * 0.4; // slight random slope

	function getClipPath(mx, my) {
		const dx = Math.tan(angle);
		// Line through (mx, my) with slope dx
		// Calculate left and right y-intercepts
		const yLeft = my - dx * mx;
		const yRight = my + dx * (w - mx);
		return `polygon(0 ${yLeft}px, ${w}px ${yRight}px, ${w}px ${h}px, 0 ${h}px)`;
	}

	// Set initial 50% split
	overlay.style.clipPath = getClipPath(w / 2, h / 2);

	function moveCursors(x, y) {
		const pos = x + 'px';
		const posY = y + 'px';
		for (const c of allCircles) {
			c.style.left = pos;
			c.style.top = posY;
		}
	}

	window.addEventListener('mousemove', (e) => {
		overlay.style.clipPath = getClipPath(e.clientX, e.clientY);
		moveCursors(e.clientX, e.clientY);
	});

	window.addEventListener('mousedown', () => {
		circleSmall.classList.add('circle-small--active');
	});

	window.addEventListener('mouseup', () => {
		circleSmall.classList.remove('circle-small--active');
	});

	window.addEventListener('resize', () => {
		w = window.innerWidth;
		h = window.innerHeight;
	});

	window.addEventListener('touchmove', (e) => {
		const touch = e.touches[0];
		overlay.style.clipPath = getClipPath(touch.clientX, touch.clientY);
	}, { passive: true });

	const scrollHint = document.querySelector('header .scroll-hint');
	let hasScrolled = false;
	window.addEventListener('scroll', () => {
		if (!hasScrolled) {
			hasScrolled = true;
			scrollHint.style.opacity = '0';
		}
	}, { passive: true });
</script>
