---
extends: base.html
---
[head]
<style>
	body {
		background: white !important;
		color: black !important;
	}

	@media (hover: hover) {
		body, body a, body button {
			cursor: none !important;
		}
	}

	header {
		width: 100%;
		height: 100vh;
		display: flex;
		flex-direction: column;
		justify-content: center;
		align-items: center;
		position: relative;
	}

	main {
		width: 100%;
		height: 100vh;
		display: flex;
		flex-direction: column;
		justify-content: space-evenly;
	}

	.logo .letter .left > div,
	.logo .letter .right > div {
		background: black !important;
	}

	a {
		color: black !important;
	}

	header .scroll-hint {
		position: absolute;
		bottom: 2rem;
		font-size: 0.75rem;
		font-family: var(--font-ui);
		opacity: 0.4;
		animation: bounce 2s infinite;
		transition: opacity 0.3s ease;
	}

	@keyframes bounce {
		0%, 100% { transform: translateY(0); }
		50% { transform: translateY(5px); }
	}

	section .content {
		display: flex;
		justify-content: center;
		align-items: center;
		gap: 1rem;
		width: 100%;
		font-size: 2rem;
	}

	section:last-child .content {
		font-size: 1rem;
	}

	/* Split overlay */
	.split-overlay {
		position: fixed;
		top: 0;
		left: 0;
		width: 100%;
		height: 100%;
		background: white;
		mix-blend-mode: difference;
		pointer-events: none;
		z-index: 1;
	}

	/* Cursor circles */
	.cursor-circle {
		position: fixed;
		border-radius: 50%;
		pointer-events: none;
		z-index: 3;
		mix-blend-mode: difference;
		transform: translate(-50%, -50%);
	}

	.circle-small {
		width: 8px;
		height: 8px;
		background: white;
		transition: transform 0.1s ease;
	}

	.circle-small--active {
		transform: translate(-50%, -50%) scale(0.5);
	}

	.circle-inner {
		width: 30px;
		height: 30px;
		border: 1.5px solid white;
		transition: width 0.15s ease, height 0.15s ease;
	}

	.circle-outer {
		width: 50px;
		height: 50px;
		border: 1px solid white;
		opacity: 0.4;
		transition: width 0.2s ease, height 0.2s ease;
	}

	@media (hover: none) {
		.cursor-circle {
			display: none !important;
		}
	}

	/* Dialog above overlay */
	dialog, dialog * {
		cursor: auto !important;
	}
	dialog button {
		cursor: pointer !important;
	}
	dialog {
		border: 2px solid black;
		background: white;
		color: black;
		padding: 2rem;
		max-width: 400px;
		width: 90%;
		box-shadow: 10px 10px 0px 0px black;
		z-index: 10;
		isolation: isolate;
	}
	dialog::backdrop {
		background: rgba(0, 0, 0, 0.5);
		z-index: 9;
	}

	@media (max-width: 768px) {
		section {
			display: flex;
			flex-direction: row;
			justify-content: center;
			width: 100%;
			flex: 1;
		}
		section .content {
			width: 100%;
			font-size: 1.25rem;
		}
		section:last-child .content {
			font-size: 0.75rem;
		}
	}
</style>
[/head]

				<div class="left"><div></div><div></div></div>

			</div>
			<div class="letter n" aria-hidden="true">

				<div class="right"><div></div></div>
			</div>
			<div class="letter c" aria-hidden="true">
				<div class="left"><div></div></div>

			</div>
			<div class="letter h" aria-hidden="true">

<main>

		<div class="content">
			<p id="intro">My name is <a class="shake" href="#" onclick="document.getElementById('about-modal').showModal(); return false;">Jason Chen</a>.</p>
		</div>
	</section>
	<section aria-labelledby="code">
		<div class="content">
			<p id="code">I write <a href="https://github.com/jsnchn" target="_blank" rel="noopener noreferrer" aria-label="GitHub profile">code</a>.</p>
		</div>

	<section aria-labelledby="write">

		</div>
	</section>
	<section aria-labelledby="email">
		<div class="content">
			<p id="email"><a href="mailto:fine.you.can.email.me@jsnchn.com">do.not.email.me@jsnchn.com</a></p>
		</div>

</main>
<div class="split-overlay" id="split-overlay"></div>
<div class="cursor-circle circle-small" id="circle-small"></div>
<div class="cursor-circle circle-inner" id="circle-inner"></div>
<div class="cursor-circle circle-outer" id="circle-outer"></div>
<script>
	const modal = document.getElementById('about-modal');

	modal.addEventListener('mouseenter', () => {
		circleSmall.style.display = 'none';
		circleInner.style.display = 'none';
		circleOuter.style.display = 'none';
	});

	modal.addEventListener('mouseleave', () => {
		circleSmall.style.display = '';
		circleInner.style.display = '';
		circleOuter.style.display = '';
	});

	modal.addEventListener('close', () => {
		circleSmall.style.display = '';
		circleInner.style.display = '';
		circleOuter.style.display = '';
	});

	const overlay = document.getElementById('split-overlay');
	const circleSmall = document.getElementById('circle-small');
	const circleInner = document.getElementById('circle-inner');
	const circleOuter = document.getElementById('circle-outer');

	let w = window.innerWidth;
	let h = window.innerHeight;
	let angle = (Math.random() - 0.5) * 0.4; // slight random slope

	function getClipPath(mx, my) {
		const dx = Math.tan(angle);
		// Line through (mx, my) with slope dx
		// Calculate left and right y-intercepts
		const yLeft = my - dx * mx;
		const yRight = my + dx * (w - mx);
		return `polygon(0 ${yLeft}px, ${w}px ${yRight}px, ${w}px ${h}px, 0 ${h}px)`;
	}

	// Set initial 50% split
	overlay.style.clipPath = getClipPath(w / 2, h / 2);

	function moveCursors(x, y) {
		const pos = `${x}px`;
		const posY = `${y}px`;
		circleSmall.style.left = pos;
		circleSmall.style.top = posY;
		circleInner.style.left = pos;
		circleInner.style.top = posY;
		circleOuter.style.left = pos;
		circleOuter.style.top = posY;
	}

	window.addEventListener('mousemove', (e) => {
		overlay.style.clipPath = getClipPath(e.clientX, e.clientY);
		moveCursors(e.clientX, e.clientY);
	});

	window.addEventListener('mousedown', () => {
		circleSmall.classList.add('circle-small--active');
	});

	window.addEventListener('mouseup', () => {
		circleSmall.classList.remove('circle-small--active');
	});

	window.addEventListener('resize', () => {
		w = window.innerWidth;
		h = window.innerHeight;
	});

	window.addEventListener('touchmove', (e) => {
		const touch = e.touches[0];
		overlay.style.clipPath = getClipPath(touch.clientX, touch.clientY);
	}, { passive: true });
</script>
