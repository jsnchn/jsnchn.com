<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Under construction since 1999 - Jason Chen</title>
	<link rel="icon" type="image/x-icon" href="/favicon.ico">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Alegreya+SC:ital,wght@0,400;0,700;1,400;1,700&family=Alegreya+Sans:ital,wght@0,400;0,700;1,400;1,700&family=Alegreya:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="/global.css">


<style>
	header {
		width: 100%;
		height: 100vh;
		display: flex;
		flex-direction: column;
		justify-content: center;
		align-items: center;
		position: relative;
	}

	main section:nth-child(even) {
		background: black;
		color: white;
	}

	main section:nth-child(even) a {
		color: white;
		border-bottom: 2px solid currentColor;
	}
	main section:nth-child(even) a:before {
		display: none;
	}

	main section:nth-of-type(even) .logo .letter .left > div,
	main section:nth-of-type(even) .logo .letter .right > div {
		background: white;
	}

	main {
		width: 100%;
		height: 100vh;
		display: flex;
		flex-direction: column;
		justify-content: space-evenly;
	}

	header .scroll-hint {
		position: absolute;
		bottom: 2rem;
		font-size: 0.75rem;
		font-family: var(--font-ui);
		opacity: 0.4;
		animation: bounce 2s infinite;
		transition: opacity 0.3s ease;
	}

	@keyframes bounce {
		0%, 100% { transform: translateY(0); }
		50% { transform: translateY(5px); }
	}

	section .content {
		display: flex;
		justify-content: center;
		align-items: center;
		gap: 1rem;
		width: 100%;
		font-size: 2rem;
	}

	section:last-child .content {
		font-size: 1rem;
	}

	dialog {
		border: 2px solid black;
		background: white;
		color: black;
		padding: 2rem;
		max-width: 400px;
		width: 90%;
		box-shadow: 10px 10px 0px 0px black;
	}
	dialog::backdrop {
		background: rgba(0, 0, 0, 0.5);
	}

	@media (max-width: 768px) {
	section {
		display: flex;
		flex-direction: row;
		justify-content: center;
		width: 100%;
		flex: 1;
	}
		section .content {
			width: 100%;
			font-size: 1.25rem;
		}
		section:last-child .content {
			font-size: 0.75rem;
		}
	}
</style>
</head>
<body>
	<header>
	<div class="logo-container" role="img" aria-label="jsnchn logo">
		<div class="logo">
			<div class="letter j" aria-hidden="true">
				<div class="left"><div></div></div>
				<div class="right"><div></div></div>
			</div>
			<div class="letter s" aria-hidden="true">
				<div class="left"><div></div><div></div></div>
				<div class="right"><div></div><div></div></div>
			</div>
			<div class="letter n" aria-hidden="true">
				<div class="left"><div></div></div>
				<div class="right"><div></div></div>
			</div>
			<div class="letter c" aria-hidden="true">
				<div class="left"><div></div></div>
				<div class="right"><div></div><div></div></div>
			</div>
			<div class="letter h" aria-hidden="true">
				<div class="left"><div></div></div>
				<div class="right"><div></div></div>
			</div>
			<div class="letter n" aria-hidden="true">
				<div class="left"><div></div></div>
				<div class="right"><div></div></div>
			</div>
		</div>
	</div>
	<div class="scroll-hint">scroll</div>
</header>
<dialog id="about-modal">
	<form method="dialog">
		<img src="/IMG_7853.jpeg" alt="" style="max-width: 100%; display: block; margin-bottom: 1rem;">
		<button value="close">Close</button>
	</form>
</dialog>
<main>
	<section aria-labelledby="intro">
		<div class="content">
			<p id="intro">My name is <a class="shake" href="#" onclick="document.getElementById('about-modal').showModal(); return false;">Jason Chen</a>.</p>
		</div>
	</section>
	<section aria-labelledby="code">
		<div class="content">
			<p id="code">I write <a href="https://github.com/jsnchn" target="_blank" rel="noopener noreferrer" aria-label="GitHub profile">code</a>.</p>
		</div>
	</section>
	<section aria-labelledby="write">
		<div class="content">
			<p id="write">I also just <a href="/blog" rel="noopener noreferrer" aria-label="Blog">write</a>.</p>
		</div>
	</section>
	<section aria-labelledby="connect">
		<div class="content">
			<p id="connect">Connect with me on <a href="https://x.com/jsnchn_" target="_blank" rel="noopener noreferrer" aria-label="X (Twitter) profile">X</a> and <a href="https://www.linkedin.com/in/jsnchn/" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn profile">Linkedin</a>.</p>
		</div>
	</section>
	<section aria-labelledby="email">
		<div class="content">
			<p id="email"><a href="mailto:fine.you.can.email.me@jsnchn.com">do.not.email.me@jsnchn.com</a></p>
		</div>
	</section>
</main>
<script>
	const scrollHint = document.querySelector('header .scroll-hint');
	let hasScrolled = false;
	window.addEventListener('scroll', () => {
		if (!hasScrolled) {
			hasScrolled = true;
			scrollHint.style.opacity = '0';
		}
	}, { passive: true });
</script>
</body>
</html>
